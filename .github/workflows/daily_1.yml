name: 股票分析-第1组

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      # 修复Gemini依赖 + 新增推送验证依赖
      - run: |
          pip install --upgrade pip
          pip install -r requirements.txt || echo "无requirements.txt，跳过"
          pip install tushare==1.2.89 pandas==2.1.4 numpy==1.26.2 requests litellm==1.40.0 google-generativeai==0.5.2
      - run: mkdir -p reports logs
      - name: 分析第1组个股（强制推送版）
        env:
          # Gemini配置
          LITELLM_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LITELLM_MODEL: "gemini/gemini-1.5-flash"
          AI_REQUEST_DELAY: '8.0'
          # 推送配置
          SERVERCHAN3_SENDKEY: ${{ secrets.SERVERCHAN3_SENDKEY }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          # 股票代码
          STOCK_LIST: "300164,600487,301137,000988,000767,601857,600126,600550,600026,601606,600744,601872,002922,600498"
          REPORT_TYPE: simple
          # 新增：强制推送开关（即使无符合条件也推送提示）
          FORCE_PUSH: "true"
        run: |
          cat > smart_analysis.py << 'EOF'
          import os
          import sys
          import time
          import json
          import requests
          import pandas as pd
          import numpy as np

          # ========== 核心配置（放宽筛选规则，更容易命中） ==========
          FILTER_RULES = {
              "ma_multi": [5, 10],  # 放宽：仅5>10即可，去掉20日线
              "price_above_ma": 5,   # 放宽：站在5日线以上即可
              "trend_days": 3,       # 放宽：最近3天上涨即可
              "request_delay": 1
          }

          # ========== 推送函数（独立封装，保证能触发） ==========
          def send_notification(title, content):
              """通用推送函数：先试企业微信，再试Server酱"""
              # 1. 企业微信推送（优先）
              wechat_hook = os.getenv("WECHAT_WEBHOOK_URL")
              if wechat_hook:
                  try:
                      data = {
                          "msgtype": "text",
                          "text": {
                              "content": f"{title}\n{content}"
                          }
                      }
                      resp = requests.post(wechat_hook, json=data, timeout=10)
                      if resp.status_code == 200:
                          print(f"企业微信推送成功：{resp.text}")
                          return True
                      else:
                          print(f"企业微信推送失败：{resp.text}")
                  except Exception as e:
                      print(f"企业微信推送异常：{str(e)}")

              # 2. Server酱推送（备用）
              send_key = os.getenv("SERVERCHAN3_SENDKEY")
              if send_key:
                  try:
                      url = f"https://sctapi.ftqq.com/{send_key}.send"
                      params = {
                          "title": title,
                          "desp": content
                      }
                      resp = requests.get(url, params=params, timeout=10)
                      if resp.status_code == 200:
                          print(f"Server酱推送成功：{resp.text}")
                          return True
                      else:
                          print(f"Server酱推送失败：{resp.text}")
                  except Exception as e:
                      print(f"Server酱推送异常：{str(e)}")

              print("所有推送方式均失败，请检查Key配置")
              return False

          # ========== 数据获取函数 ==========
          def get_stock_data(stock_code):
              try:
                  import tushare as ts
                  pro = ts.pro_api()
                  market = "SH" if stock_code.startswith("6") else "SZ"
                  ts_code = f"{stock_code}.{market}"
                  df = pro.daily(ts_code=ts_code, count=20)  # 减少数据量，加快速度
                  if not df.empty:
                      df = df.sort_values("trade_date").reset_index(drop=True)
                      df["close"] = df["close"].astype(float)
                      return df
              except:
                  pass

              try:
                  url = f"https://push2his.eastmoney.com/api/qt/stock/kline/get?secid={1 if stock_code.startswith('6') else 0}.{stock_code}&klt=101&fqt=0&beg=0&end=20990101&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57,f58"
                  resp = requests.get(url, timeout=10)
                  data = resp.json()
                  if data["data"]["klines"]:
                      rows = []
                      for line in data["data"]["klines"]:
                          parts = line.split(",")
                          rows.append({
                              "trade_date": parts[0].replace("-", ""),
                              "close": float(parts[2])
                          })
                      df = pd.DataFrame(rows[-20:])
                      df = df.sort_values("trade_date").reset_index(drop=True)
                      return df
              except:
                  pass

              return pd.DataFrame()

          # ========== 筛选函数（放宽规则） ==========
          def filter_stock(stock_code):
              try:
                  df = get_stock_data(stock_code)
                  if df.empty or len(df) < FILTER_RULES["trend_days"]:
                      print(f"[{stock_code}] 数据不足，跳过")
                      return False

                  # 计算均线
                  for ma in FILTER_RULES["ma_multi"]:
                      df[f"ma{ma}"] = df["close"].rolling(window=ma).mean()

                  # 取最新有效数据
                  latest = df.dropna().iloc[-1]
                  if pd.isna(latest).any():
                      print(f"[{stock_code}] 均线计算失败，跳过")
                      return False

                  # 放宽后的筛选条件
                  ma_values = [latest[f"ma{ma}"] for ma in FILTER_RULES["ma_multi"]]
                  ma_multi = all(ma_values[i] > ma_values[i+1] for i in range(len(ma_values)-1))
                  price_above_ma = latest["close"] > latest[f"ma{FILTER_RULES['price_above_ma']}"]
                  recent_data = df.dropna().iloc[-FILTER_RULES['trend_days']:]["close"].values
                  slope = np.polyfit(range(len(recent_data)), recent_data, 1)[0]
                  trend_up = slope > 0  # 斜率>0即判定为上涨

                  result = ma_multi and price_above_ma and trend_up
                  print(f"[{stock_code}] 筛选结果：{'通过' if result else '不通过'} | 均线多头：{ma_multi} | 股价站{FILTER_RULES['price_above_ma']}日线：{price_above_ma} | 上涨趋势：{trend_up}")
                  return result

              except Exception as e:
                  print(f"[{stock_code}] 筛选出错：{str(e)[:50]}")
                  return False

          # ========== AI分析函数 ==========
          def run_ai_analysis(filtered_stocks):
              import subprocess
              os.environ["STOCK_LIST"] = ",".join(filtered_stocks)
              os.environ["GEMINI_API_KEY"] = os.getenv("LITELLM_API_KEY")
              os.environ["MODEL"] = os.getenv("LITELLM_MODEL")
              
              max_retries = 2  # 减少重试次数，加快速度
              for i in range(max_retries):
                  try:
                      result = subprocess.run(
                          [sys.executable, "main.py"],
                          env=os.environ,
                          check=True,
                          capture_output=True,
                          text=True
                      )
                      print(f"AI分析成功，输出：{result.stdout[:200]}")
                      return True, result.stdout
                  except subprocess.CalledProcessError as e:
                      error_msg = f"第{i+1}次AI分析失败，错误：{e.stderr[:200]}"
                      print(error_msg)
                      time.sleep(5)
                  except Exception as e:
                      error_msg = f"第{i+1}次运行异常：{str(e)[:50]}"
                      print(error_msg)
                      time.sleep(5)
              return False, "AI分析多次失败"

          # ========== 主逻辑（强制推送） ==========
          if __name__ == "__main__":
              # 初始化
              stock_list = [code.strip() for code in os.getenv("STOCK_LIST", "").split(",") if code.strip()]
              force_push = os.getenv("FORCE_PUSH", "false").lower() == "true"
              current_time = time.strftime("%Y-%m-%d %H:%M:%S", time.localtime())

              # 1. 筛选股票
              print(f"=== 开始筛选 [{current_time}] ===")
              filtered_stocks = []
              for idx, code in enumerate(stock_list):
                  if filter_stock(code):
                      filtered_stocks.append(code)
                  if idx < len(stock_list)-1:
                      time.sleep(FILTER_RULES["request_delay"])

              # 2. 生成推送内容
              title = f"【股票分析结果-第1组】{current_time}"
              if filtered_stocks:
                  # 有符合条件的股票：先AI分析，再推送
                  ai_success, ai_msg = run_ai_analysis(filtered_stocks)
                  if ai_success:
                      content = f"✅ 筛选通过：{len(filtered_stocks)}只\n代码：{','.join(filtered_stocks)}\n\n📊 AI分析结果：\n{ai_msg[:500]}"  # 截取前500字
                  else:
                      content = f"✅ 筛选通过：{len(filtered_stocks)}只\n代码：{','.join(filtered_stocks)}\n\n❌ AI分析失败：{ai_msg}\n（仅推送筛选结果，保留原有买卖建议逻辑）"
              else:
                  # 无符合条件的股票：强制推送提示
                  content = f"❌ 无符合条件的股票（已放宽筛选规则）\n原始股票数：{len(stock_list)}\n筛选规则：5>10日线+站5日线+3天上涨"

              # 3. 强制推送（无论是否有符合条件）
              print(f"\n=== 开始推送 ===")
              print(f"推送内容：{content}")
              send_success = send_notification(title, content)

              # 4. 日志输出
              print(f"\n=== 运行完成 ===")
              print(f"原始股票数：{len(stock_list)}")
              print(f"筛选通过数：{len(filtered_stocks)}")
              print(f"推送状态：{'成功' if send_success else '失败'}")

              # 5. 写入日志文件
              with open("logs/push_log.txt", "a", encoding="utf-8") as f:
                  f.write(f"[{current_time}] 原始：{len(stock_list)} | 通过：{len(filtered_stocks)} | 推送：{send_success}\n")
          EOF
          
          # 执行脚本并打印日志
          python smart_analysis.py > logs/smart_filter.log 2>&1
          cat logs/smart_filter.log
      # 上传日志（方便排查）
      - name: 上传日志和报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: 第1组运行日志-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 7
