name: 股票分析-第1组

on:
  # 定时触发：北京时间18:00（UTC 10:00）
  schedule:
    - cron: '0 10 * * 1-5'
  # 手动触发开关
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    # 超时保护：20分钟（足够运行35只）
    timeout-minutes: 20
    steps:
      # 检出仓库代码
      - uses: actions/checkout@v4
      # 配置Python环境
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # 缓存依赖，加速安装
      # 安装依赖包
      - run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      # 创建必要目录
      - run: mkdir -p reports logs
      # 核心：运行股票分析
      - name: 分析第1组个股
        env:
          # AI配置（核心防限流）
          AIHUBMIX_KEY: ${{ secrets.AIHUBMIX_KEY }}
          AI_REQUEST_DELAY: '5.0' # 每只股票分析间隔5秒，杜绝限流
          # 推送配置
          SERVERCHAN3_SENDKEY: ${{ secrets.SERVERCHAN3_SENDKEY }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          # 个股代码（无需修改）
          STOCK_LIST: "300164,600487,301137,000988,000767,601857,600126,600550,600026,601606,600744,601872,002922,600498,000899,002261,002428,001896,600875,600230,600010,601212,600759,002498,301018,600722,002378,603466,002506,002155,000858,002009,600986,000681,002342"
          # 报告配置（轻量模式，更快）
          REPORT_TYPE: simple
        run: python main.py
      # 上传报告（方便查看）
      - name: 上传第1组分析报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: 第1组分析报告-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 7
